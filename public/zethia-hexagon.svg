<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#06D6A0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer hexagon -->
  <polygon points="60,8 106,35 106,85 60,112 14,85 14,35" fill="none" stroke="url(#g1)" stroke-width="3" filter="url(#glow)"/>
  <!-- Inner hexagon (filled, translucent) -->
  <polygon points="60,30 88,46 88,74 60,90 32,74 32,46" fill="#7C3AED" fill-opacity="0.15" stroke="#7C3AED" stroke-width="1.5"/>
  <!-- Center dot -->
  <circle cx="60" cy="60" r="4" fill="#06D6A0" filter="url(#glow)"/>
</svg>
